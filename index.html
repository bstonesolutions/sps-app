<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#B81D24" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SPS" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/icon-180.png" />
    <link rel="apple-touch-icon" media="(prefers-color-scheme: dark)" href="/icon-180-dark.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Stone Property Solutions</title>
    <style>
      /* Match the splash background exactly (SPS crimson = T.primary #B81D24) so the
         very first paint, before any JS runs, is already the splash color — no flash. */
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        min-height: 100dvh;
        background: #B81D24;
        overscroll-behavior: none;
        /* Base app font (Rounded) so the very first paint and any body-portaled
           popups never fall back to the browser serif. The app keeps document.body's
           font in sync with the user's chosen App Font at runtime. */
        font-family: ui-rounded, "SF Pro Rounded", "Hiragino Maru Gothic Pro", "Nunito", system-ui, sans-serif;
      }
      #root {
        background: #B81D24;
        height: 100%;
        min-height: 100dvh;
      }
      /* Hard-lock the document while an auth screen (login) is shown so the
         card can't scroll or rubber-band on iOS. Toggled by the login component. */
      body.auth-active { position: fixed; width: 100%; height: 100%; overflow: hidden; top: 0; left: 0; }
      /* Global animations used across the app (sync strip, spinners) so they work
         even when the splash screen — which also declares them — is not mounted. */
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes syncPulse { 0%, 100% { opacity: 0.45; } 50% { opacity: 1; } }
      @keyframes spsModalIn { from { opacity: 0; transform: translateY(12px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
      /* ── Premium boot / welcome-screen motion (pure CSS — plays on the very first paint, before React) ── */
      #boot-splash { overflow: hidden; }
      .boot-glow { position:absolute; top:36%; left:50%; width:70vmax; height:70vmax; max-width:640px; max-height:640px; transform:translate(-50%,-50%); background:radial-gradient(circle, rgba(255,120,128,.5) 0%, rgba(232,64,74,.24) 34%, rgba(184,29,36,0) 66%); filter:blur(8px); z-index:0; pointer-events:none; animation:bootGlow 4.6s ease-in-out infinite; }
      .boot-vignette { position:absolute; inset:0; z-index:0; pointer-events:none; background:radial-gradient(120% 80% at 50% 40%, rgba(0,0,0,0) 55%, rgba(90,8,12,.4) 100%); }
      .boot-logo { position:relative; z-index:2; width:92px; height:92px; border-radius:26px; overflow:hidden; margin-bottom:22px; box-shadow:0 20px 52px rgba(60,0,4,.5), 0 3px 10px rgba(0,0,0,.28); animation:bootDrop 1s cubic-bezier(.16,1,.3,1) .05s both, bootFloat 4.2s ease-in-out 1.1s infinite; }
      .boot-logo img { display:block; width:100%; height:100%; object-fit:cover; }
      .boot-shine { position:absolute; top:-40%; left:-60%; width:55%; height:180%; background:linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,.6) 50%, rgba(255,255,255,0) 100%); transform:rotate(18deg); animation:bootShine 4.5s ease-in-out 0.9s infinite; }
      #boot-name { position:relative; z-index:2; animation:bootRise .8s cubic-bezier(.16,1,.3,1) .5s both; }
      #boot-tagline { position:relative; z-index:2; animation:bootRise .8s cubic-bezier(.16,1,.3,1) .66s both; }
      .boot-loader { position:absolute; bottom:64px; left:50%; transform:translateX(-50%); width:132px; height:3px; border-radius:100px; background:rgba(255,255,255,.2); overflow:hidden; z-index:2; animation:bootFadeIn .6s ease 1.1s both; }
      .boot-loader i { position:absolute; top:0; left:-42%; width:42%; height:100%; border-radius:100px; background:linear-gradient(90deg, rgba(255,255,255,0), rgba(255,255,255,.95), rgba(255,255,255,0)); animation:bootIndet 1.5s cubic-bezier(.5,0,.5,1) infinite; }
      @keyframes bootDrop { 0%{opacity:0; transform:translateY(-16px) scale(.84)} 100%{opacity:1; transform:translateY(0) scale(1)} }
      @keyframes bootFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
      @keyframes bootRise { 0%{opacity:0; transform:translateY(15px)} 100%{opacity:1; transform:translateY(0)} }
      @keyframes bootFadeIn { 0%{opacity:0} 100%{opacity:1} }
      @keyframes bootGlow { 0%,100%{opacity:.5; transform:translate(-50%,-50%) scale(1)} 50%{opacity:.9; transform:translate(-50%,-50%) scale(1.12)} }
      @keyframes bootShine { 0%{transform:translateX(-40%) rotate(18deg)} 20%,100%{transform:translateX(560%) rotate(18deg)} }
      @keyframes bootIndet { 0%{left:-42%} 100%{left:100%} }
    </style>
  </head>
  <body style="margin:0; background:#B81D24">
    <div id="root"></div>
    <!-- BOOT SPLASH: the very first paint already IS the SPS splash (crimson + centered
         logo + name), so no grey/blank/other screen is ever seen before React loads.
         It's a sibling of #root (React doesn't wipe it) and mirrors the React splash's
         logo size/position, so when React removes it the handoff is invisible.
         #AF011A is the native config color; the WEB splash is T.primary #B81D24 — use that. -->
    <div id="boot-splash" style="position:fixed; inset:0; width:100%; height:100%; overflow:hidden; background:#B81D24; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:99999; font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Inter',system-ui,sans-serif; -webkit-font-smoothing:antialiased;">
      <div class="boot-glow"></div>
      <div class="boot-vignette"></div>
      <div class="boot-logo">
        <img src="/icon-512.png" alt="SPS" />
        <div class="boot-shine"></div>
      </div>
      <div id="boot-name" style="font-size:26px; font-weight:900; letter-spacing:-0.04em; color:#fff; line-height:1.08; text-align:center; padding:0 28px;">Stone Property Solutions</div>
      <div id="boot-tagline" style="margin-top:9px; font-size:15px; font-weight:500; color:rgba(255,255,255,0.62);">The &quot;SPS&quot; Way</div>
      <!-- React fills the welcome pill in #boot-greeting once it knows who's signed in
           (staff or client). The slot reserves space so nothing shifts when it appears. -->
      <div id="boot-greeting-slot" style="margin-top:26px; height:46px; display:flex; align-items:center; justify-content:center;">
        <div id="boot-greeting" style="opacity:0; transition:opacity 0.4s ease; background:rgba(255,255,255,0.15); border-radius:100px; padding:11px 26px; font-size:18px; font-weight:800; color:#fff; -webkit-backdrop-filter:blur(8px); backdrop-filter:blur(8px); white-space:nowrap;"></div>
      </div>
      <div class="boot-loader"><i></i></div>
    </div>
    <script>
      // Safety net: never let the boot splash get permanently stuck if React's
      // removal doesn't fire (e.g. the session never resolves). React removes it
      // the instant the real screen is up; this is only a last-resort fallback.
      setTimeout(function () { var b = document.getElementById('boot-splash'); if (b) b.remove(); }, 8000);
    </script>
    <script type="module" src="/main.jsx"></script>
  </body>
</html>
