<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#B81D24" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SPS" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/icon-180.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Stone Property Solutions</title>
    <style>
      /* Match the splash background exactly (SPS crimson = T.primary #B81D24) so the
         very first paint, before any JS runs, is already the splash color — no flash. */
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        min-height: 100dvh;
        background: #B81D24;
        overscroll-behavior: none;
      }
      #root {
        background: #B81D24;
        height: 100%;
        min-height: 100dvh;
      }
      /* Hard-lock the document while an auth screen (login) is shown so the
         card can't scroll or rubber-band on iOS. Toggled by the login component. */
      body.auth-active { position: fixed; width: 100%; height: 100%; overflow: hidden; top: 0; left: 0; }
      /* Global animations used across the app (sync strip, spinners) so they work
         even when the splash screen — which also declares them — is not mounted. */
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes syncPulse { 0%, 100% { opacity: 0.45; } 50% { opacity: 1; } }
      @keyframes spsModalIn { from { opacity: 0; transform: translateY(12px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
    </style>
  </head>
  <body style="margin:0; background:#B81D24">
    <div id="root"></div>
    <!-- BOOT SPLASH: the very first paint already IS the SPS splash (crimson + centered
         logo + name), so no grey/blank/other screen is ever seen before React loads.
         It's a sibling of #root (React doesn't wipe it) and mirrors the React splash's
         logo size/position, so when React removes it the handoff is invisible.
         #AF011A is the native config color; the WEB splash is T.primary #B81D24 — use that. -->
    <div id="boot-splash" style="position:fixed; inset:0; width:100%; height:100%; background:#B81D24; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:99999; font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Inter',system-ui,sans-serif; -webkit-font-smoothing:antialiased;">
      <img src="/icon-512.png" alt="SPS" style="width:92px; height:92px; border-radius:26px; object-fit:cover; box-shadow:0 16px 48px rgba(0,0,0,0.35),0 2px 8px rgba(0,0,0,0.2); margin-bottom:24px;" />
      <div style="font-size:26px; font-weight:900; letter-spacing:-0.04em; color:#fff; line-height:1;">Stone Property Solutions</div>
    </div>
    <script>
      // Safety net: never let the boot splash get permanently stuck if React's
      // removal doesn't fire (e.g. the session never resolves). React removes it
      // the instant the real screen is up; this is only a last-resort fallback.
      setTimeout(function () { var b = document.getElementById('boot-splash'); if (b) b.remove(); }, 8000);
    </script>
    <script type="module" src="/main.jsx"></script>
  </body>
</html>
