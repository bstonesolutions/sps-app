<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#AF011A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SPS" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/icon-180.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Stone Property Solutions</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        min-height: 100dvh;
        background: #AF011A;
        overscroll-behavior: none;
      }
      #root {
        min-height: 100dvh;
      }
      /* Global animations used across the app (sync strip, spinners) so they work
         even when the splash screen — which also declares them — is not mounted. */
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes syncPulse { 0%, 100% { opacity: 0.45; } 50% { opacity: 1; } }
    </style>
  </head>
  <body style="margin:0">
    <div id="root"></div>
    <script type="module" src="/main.jsx"></script>
  </body>
</html>
